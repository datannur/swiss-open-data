app_path: ./catalog
metadata_path: ./metadata
refresh: false
# stat depth: variable statistics without frequency/enumeration tables, which
# would add ~50 MB to the app's initial load at this catalog size
depth: stat
export_size_report: true
open_browser: true
log_file: ./staging/logs/datannurpy.log

copy_assets:
  - from: ./app_conf
    to: data
    include: "*.config.json"
  - from: ./staging/docs
    to: data/doc
    include: "*.pdf"
  - from: ./public/img
    to: data/img
    
add:
  - folder: ./data
    create_folders: false
