app_path: ./catalog
metadata_path: ./metadata
refresh: false
# value depth: deepest scan (variable statistics). Affordable here because the
# i14y corpus is small (~180 datasets). auto_enumerations is off: the code lists
# come from i14y (metadata/enumeration.csv + value.csv), not from the data scan.
depth: value
auto_enumerations: false
export_size_report: true
open_browser: false
log_file: ./staging/logs/datannurpy.log

copy_assets:
  - from: ./app_conf
    to: data
    include: "*.config.json"
  - from: ./staging/docs
    to: data/doc
    include: "*.pdf"
  - from: ./public/img
    to: data/img
    
add:
  # Data files downloaded from i14y distributions by src/i14y.py. Folders come
  # from metadata/folder.csv, so directory folders are not created here.
  - folder: ./data/i14y
    create_folders: false
  # Reference classifications (NOGA, ISCO, CHOP, ...) as browsable nomenclature
  # tables. depth: stat = no frequency tables (every code is unique); a high
  # preview_rows keeps the full table, loaded on demand (no startup cost).
  - folder: ./data/classifications
    create_folders: false
    depth: stat
    preview_rows: 50000
