app_path: ./catalog
metadata_path: ./metadata
refresh: false
freq_threshold: 20
open_browser: true
log_file: ./staging/logs/datannurpy.log

copy_assets:
  - from: ./app_conf
    to: data
    include: "*.config.json"
  - from: ./staging/docs
    to: data/doc
    include: "*.pdf"
  - from: ./public/img
    to: data/img
    
add:
  - folder: ./data
    create_folders: false
